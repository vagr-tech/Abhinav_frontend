<!-- assets/icons/bike.svg -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Rear wheel -->
  <circle cx="12" cy="44" r="10" fill="none" stroke="#00C853" stroke-width="3.5"/>
  <circle cx="12" cy="44" r="3" fill="#00C853"/>
  <!-- Front wheel -->
  <circle cx="52" cy="44" r="10" fill="none" stroke="#00C853" stroke-width="3.5"/>
  <circle cx="52" cy="44" r="3" fill="#00C853"/>
  <!-- Frame -->
  <line x1="12" y1="44" x2="30" y2="22" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="22" x2="52" y2="44" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="22" x2="38" y2="44" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>
  <line x1="12" y1="44" x2="38" y2="44" stroke="#00C853" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Handlebar -->
  <line x1="46" y1="22" x2="56" y2="22" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>
  <line x1="50" y1="20" x2="52" y2="30" stroke="#00C853" stroke-width="3" stroke-linecap="round"/>
